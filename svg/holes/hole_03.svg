<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <marker id="windArrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5577aa"/>
    </marker>
    <linearGradient id="fairwayGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#82b888"/>
      <stop offset="50%" style="stop-color:#90c695"/>
      <stop offset="100%" style="stop-color:#82b888"/>
    </linearGradient>
    <radialGradient id="greenGrad3">
      <stop offset="0%" style="stop-color:#3a9a4a"/>
      <stop offset="100%" style="stop-color:#2d7a3a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#7aaa7a"/>

  <!-- Hole info -->
  <rect x="10" y="10" width="220" height="50" rx="5" fill="rgba(0,0,0,0.6)"/>
  <text x="20" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="white">Hole 3 — Par 3</text>
  <text x="20" y="50" font-family="Arial, sans-serif" font-size="13" fill="#ccc">165 Yards • Slightly Uphill</text>

  <!-- Wind arrow -->
  <g transform="translate(540, 40)">
    <circle cx="0" cy="0" r="22" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-14" y1="0" x2="12" y2="0" stroke="#5577aa" stroke-width="2" marker-end="url(#windArrow3)"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">WIND</text>
    <text x="16" y="4" font-family="Arial, sans-serif" font-size="7" fill="#aac">E</text>
  </g>

  <!-- Uphill indication - contour lines -->
  <path d="M 310,280 Q 330,260 350,280" fill="none" stroke="#6a9a6a" stroke-width="0.8" opacity="0.4"/>
  <path d="M 340,260 Q 360,240 380,260" fill="none" stroke="#6a9a6a" stroke-width="0.8" opacity="0.4"/>
  <path d="M 370,240 Q 390,220 410,240" fill="none" stroke="#6a9a6a" stroke-width="0.8" opacity="0.4"/>

  <!-- Fairway - short par 3, plays East -->
  <path d="M 120,165 Q 170,155 230,150 Q 290,148 350,148 Q 400,150 430,155 Q 450,160 460,165
           Q 460,240 450,245 Q 430,250 400,252 Q 350,254 290,254 Q 230,252 170,248 Q 130,242 120,238 Z" 
        fill="url(#fairwayGrad3)" stroke="#6a9a6a" stroke-width="1.5"/>

  <!-- Trees top -->
  <circle cx="180" cy="130" r="10" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="250" cy="125" r="9" fill="#1f6a1f" opacity="0.6"/>
  <circle cx="320" cy="122" r="10" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="390" cy="125" r="9" fill="#1f6a1f" opacity="0.6"/>

  <!-- Trees bottom -->
  <circle cx="200" cy="275" r="9" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="270" cy="278" r="10" fill="#1f6a1f" opacity="0.6"/>
  <circle cx="340" cy="280" r="9" fill="#1a5c1a" opacity="0.7"/>

  <!-- 150 yard marker -->
  <line x1="218" y1="155" x2="218" y2="245" stroke="#ff0" stroke-width="1.5" opacity="0.5"/>
  <text x="218" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff0" font-weight="bold" opacity="0.8">150</text>

  <!-- Bunker front-left of green -->
  <ellipse cx="440" cy="245" rx="16" ry="11" fill="#d4b97c" stroke="#b89a5c" stroke-width="1.5"/>
  <ellipse cx="440" cy="245" rx="10" ry="7" fill="#e0c88a" opacity="0.5"/>

  <!-- Green -->
  <ellipse cx="470" cy="200" rx="30" ry="35" fill="url(#greenGrad3)" stroke="#1a5a2a" stroke-width="2"/>
  <ellipse cx="468" cy="198" rx="20" ry="22" fill="none" stroke="#2a8a3a" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="465" cy="195" rx="10" ry="12" fill="none" stroke="#2a8a3a" stroke-width="0.5" opacity="0.3"/>

  <!-- Pin -->
  <circle cx="468" cy="195" r="3" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <line x1="468" y1="195" x2="468" y2="178" stroke="white" stroke-width="1.5"/>
  <polygon points="468,178 480,182 468,186" fill="#cc3333"/>

  <!-- Tee boxes -->
  <rect x="85" y="178" width="22" height="10" rx="2" fill="#3366aa" stroke="#2255aa" stroke-width="1"/>
  <text x="96" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3366aa">BLUE</text>
  <rect x="88" y="210" width="20" height="9" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="98" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">WHITE</text>

  <!-- Elevation note -->
  <text x="360" y="310" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" font-style="italic">↑ Slightly uphill to green</text>
</svg>
