<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <marker id="windArrow6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5577aa"/>
    </marker>
    <linearGradient id="fairwayGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#82b888"/>
      <stop offset="50%" style="stop-color:#90c695"/>
      <stop offset="100%" style="stop-color:#82b888"/>
    </linearGradient>
    <radialGradient id="greenGrad6">
      <stop offset="0%" style="stop-color:#3a9a4a"/>
      <stop offset="100%" style="stop-color:#2d7a3a"/>
    </radialGradient>
    <radialGradient id="waterGrad6">
      <stop offset="0%" style="stop-color:#6ab0e8"/>
      <stop offset="100%" style="stop-color:#3a80c0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#7aaa7a"/>

  <!-- Hole info -->
  <rect x="10" y="10" width="220" height="50" rx="5" fill="rgba(0,0,0,0.6)"/>
  <text x="20" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="white">Hole 6 — Par 3</text>
  <text x="20" y="50" font-family="Arial, sans-serif" font-size="13" fill="#ccc">150 Yards • Water Left</text>

  <!-- Wind arrow -->
  <g transform="translate(540, 40)">
    <circle cx="0" cy="0" r="22" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="14" y1="0" x2="-12" y2="0" stroke="#5577aa" stroke-width="2" marker-end="url(#windArrow6)"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">WIND</text>
    <text x="-16" y="4" font-family="Arial, sans-serif" font-size="7" fill="#aac">W</text>
  </g>

  <!-- Irrigation Pond - left of hole -->
  <ellipse cx="160" cy="260" rx="70" ry="55" fill="url(#waterGrad6)" opacity="0.6" stroke="#3a70b0" stroke-width="2"/>
  <!-- Water ripples -->
  <ellipse cx="145" cy="250" rx="30" ry="20" fill="none" stroke="#6ab0e8" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="170" cy="270" rx="25" ry="15" fill="none" stroke="#6ab0e8" stroke-width="0.8" opacity="0.4"/>
  <!-- Reeds/cattails -->
  <line x1="95" y1="240" x2="92" y2="225" stroke="#5a8a4a" stroke-width="2"/>
  <line x1="100" y1="245" x2="98" y2="228" stroke="#5a8a4a" stroke-width="2"/>
  <line x1="105" y1="248" x2="104" y2="232" stroke="#5a8a4a" stroke-width="2"/>
  <line x1="220" y1="285" x2="222" y2="270" stroke="#5a8a4a" stroke-width="2"/>
  <line x1="225" y1="280" x2="228" y2="265" stroke="#5a8a4a" stroke-width="2"/>
  <text x="160" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2a5a90" font-style="italic" font-weight="bold">Irrigation Pond</text>

  <!-- Hazard line -->
  <path d="M 190,200 Q 220,210 235,225" fill="none" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Fairway - short par 3, plays W -->
  <path d="M 480,160 Q 440,155 390,152 Q 340,150 290,152 Q 260,155 240,160 
           Q 240,230 250,235 Q 270,240 300,242 Q 340,244 390,242 Q 440,238 475,232 Q 485,228 485,225 Z" 
        fill="url(#fairwayGrad6)" stroke="#6a9a6a" stroke-width="1.5"/>

  <!-- 150 yard marker -->
  <line x1="345" y1="155" x2="345" y2="240" stroke="#ff0" stroke-width="1.5" opacity="0.5"/>
  <text x="345" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff0" font-weight="bold" opacity="0.8">150</text>

  <!-- Trees top -->
  <circle cx="320" cy="130" r="9" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="400" cy="128" r="8" fill="#1f6a1f" opacity="0.6"/>
  <circle cx="270" cy="135" r="8" fill="#1a5c1a" opacity="0.6"/>

  <!-- Trees bottom right -->
  <circle cx="400" cy="265" r="9" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="350" cy="270" r="8" fill="#1f6a1f" opacity="0.6"/>

  <!-- Green -->
  <ellipse cx="235" cy="195" rx="28" ry="32" fill="url(#greenGrad6)" stroke="#1a5a2a" stroke-width="2"/>
  <ellipse cx="233" cy="193" rx="18" ry="20" fill="none" stroke="#2a8a3a" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="231" cy="190" rx="9" ry="10" fill="none" stroke="#2a8a3a" stroke-width="0.5" opacity="0.3"/>

  <!-- Pin -->
  <circle cx="233" cy="190" r="3" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <line x1="233" y1="190" x2="233" y2="173" stroke="white" stroke-width="1.5"/>
  <polygon points="233,173 221,177 233,181" fill="#cc3333"/>

  <!-- Tee boxes -->
  <rect x="488" y="175" width="22" height="10" rx="2" fill="#3366aa" stroke="#2255aa" stroke-width="1"/>
  <text x="499" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3366aa">BLUE</text>
  <rect x="480" y="200" width="20" height="9" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="490" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">WHITE</text>

  <!-- Warning text -->
  <text x="300" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" font-style="italic">Anything left is wet!</text>
</svg>
