<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <marker id="windArrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5577aa"/>
    </marker>
    <linearGradient id="fairwayGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#82b888"/>
      <stop offset="50%" style="stop-color:#90c695"/>
      <stop offset="100%" style="stop-color:#82b888"/>
    </linearGradient>
    <radialGradient id="greenGrad4">
      <stop offset="0%" style="stop-color:#3a9a4a"/>
      <stop offset="100%" style="stop-color:#2d7a3a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#7aaa7a"/>

  <!-- Hole info -->
  <rect x="10" y="10" width="250" height="50" rx="5" fill="rgba(0,0,0,0.6)"/>
  <text x="20" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="white">Hole 4 — Par 5</text>
  <text x="20" y="50" font-family="Arial, sans-serif" font-size="13" fill="#ccc">490 Yards • Dogleg Left • River Right</text>

  <!-- Wind arrow -->
  <g transform="translate(540, 40)">
    <circle cx="0" cy="0" r="22" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-8" y1="-10" x2="8" y2="8" stroke="#5577aa" stroke-width="2" marker-end="url(#windArrow4)"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">WIND</text>
    <text x="12" y="14" font-family="Arial, sans-serif" font-size="7" fill="#aac">SE</text>
  </g>

  <!-- Yakima River - right side on approach -->
  <path d="M 500,20 Q 520,60 530,120 Q 540,180 545,240 Q 548,300 540,350 Q 535,380 530,400" 
        fill="none" stroke="#4a90d9" stroke-width="30" opacity="0.3"/>
  <path d="M 500,20 Q 520,60 530,120 Q 540,180 545,240 Q 548,300 540,350 Q 535,380 530,400" 
        fill="none" stroke="#4a90d9" stroke-width="14" opacity="0.5"/>
  <path d="M 500,20 Q 520,60 530,120 Q 540,180 545,240 Q 548,300 540,350 Q 535,380 530,400" 
        fill="none" stroke="#4a90d9" stroke-width="4" opacity="0.7"/>
  <text x="555" y="200" font-family="Arial, sans-serif" font-size="11" fill="#2a6ab0" font-style="italic"
        transform="rotate(85, 555, 200)">Yakima River</text>

  <!-- OB line right (river) -->
  <line x1="490" y1="150" x2="510" y2="380" stroke="#cc3333" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="488" y="290" font-family="Arial, sans-serif" font-size="9" fill="#cc3333" font-weight="bold"
        transform="rotate(82, 488, 290)">OB — RIVER</text>

  <!-- River trees -->
  <circle cx="510" cy="80" r="8" fill="#1a5c1a" opacity="0.6"/>
  <circle cx="520" cy="140" r="9" fill="#1f6a1f" opacity="0.6"/>
  <circle cx="525" cy="200" r="8" fill="#1a5c1a" opacity="0.6"/>
  <circle cx="530" cy="270" r="9" fill="#1f6a1f" opacity="0.6"/>

  <!-- Fairway - dogleg left, plays SE -->
  <path d="M 80,60 Q 100,75 130,100 Q 160,130 190,170 Q 215,210 240,250 
           Q 260,285 280,310 Q 310,345 350,365 Q 390,378 430,380
           Q 440,390 430,395 Q 390,395 350,382 Q 310,365 280,335 
           Q 255,305 235,275 Q 210,240 185,200 Q 160,160 135,130 
           Q 110,105 90,85 Q 78,75 72,68 Z" 
        fill="url(#fairwayGrad4)" stroke="#6a9a6a" stroke-width="1.5"/>

  <!-- Trees right of tee shot -->
  <circle cx="130" cy="80" r="8" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="160" cy="110" r="9" fill="#1f6a1f" opacity="0.6"/>
  <circle cx="195" cy="150" r="8" fill="#1a5c1a" opacity="0.7"/>
  <circle cx="225" cy="190" r="9" fill="#1f6a1f" opacity="0.6"/>

  <!-- Trees left side scattered -->
  <circle cx="60" cy="100" r="7" fill="#1a5c1a" opacity="0.5"/>
  <circle cx="175" cy="230" r="8" fill="#1f6a1f" opacity="0.5"/>
  <circle cx="230" cy="295" r="7" fill="#1a5c1a" opacity="0.5"/>

  <!-- Yardage markers -->
  <text x="113" y="130" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold" opacity="0.8">250</text>
  <line x1="130" y1="122" x2="155" y2="135" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <text x="180" y="215" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold" opacity="0.8">200</text>
  <line x1="200" y1="210" x2="220" y2="225" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <text x="248" y="310" font-family="Arial, sans-serif" font-size="10" fill="#ff0" font-weight="bold" opacity="0.8">150</text>
  <line x1="268" y1="305" x2="285" y2="322" stroke="#ff0" stroke-width="1.5" opacity="0.7"/>

  <!-- Green -->
  <ellipse cx="450" cy="382" rx="25" ry="18" fill="url(#greenGrad4)" stroke="#1a5a2a" stroke-width="2"/>
  <ellipse cx="448" cy="380" rx="16" ry="11" fill="none" stroke="#2a8a3a" stroke-width="0.5" opacity="0.4"/>

  <!-- Pin -->
  <circle cx="448" cy="379" r="3" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <line x1="448" y1="379" x2="448" y2="362" stroke="white" stroke-width="1.5"/>
  <polygon points="448,362 460,366 448,370" fill="#cc3333"/>

  <!-- Tee boxes -->
  <rect x="60" y="48" width="22" height="10" rx="2" fill="#3366aa" stroke="#2255aa" stroke-width="1"/>
  <text x="71" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3366aa">BLUE</text>
  <rect x="75" y="60" width="20" height="9" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="85" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">WHITE</text>
</svg>
